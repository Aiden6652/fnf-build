name: Build FNF iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone asset and art repos
        run: |
          git clone --depth 1 https://github.com/FunkinCrew/Funkin.assets assets
          git clone --depth 1 https://github.com/FunkinCrew/Funkin.art art

      - name: Install Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup haxelib
        run: |
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib

      - name: Install hmm (dependency manager)
        run: |
          haxelib --global install hmm --quiet
          haxelib --global run hmm setup

      - name: Install Haxe dependencies
        run: haxelib run hmm install --quiet
        timeout-minutes: 30

      - name: Compile hxcpp tools
        run: |
          cd $(haxelib path hxcpp | sed "s/,//g")/tools/hxcpp
          haxe compile.hxml

      - name: Build for iOS (no signing)
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
          DEVELOPMENT_TEAM: ""
        run: haxelib run lime build ios -release -D nosign --times
        timeout-minutes: 60

      - name: Package IPA
        run: |
          APP_PATH="export/release/ios/build/Release-iphoneos/Funkin.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found, searching..."
            find export/release/ios -name "*.app" -type d 2>/dev/null
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r FNF_0.7.4_iOS.ipa Payload/
          ls -la FNF_0.7.4_iOS.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FNF_0.7.4_iOS
          path: FNF_0.7.4_iOS.ipa
          retention-days: 7
