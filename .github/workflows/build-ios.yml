name: Build FNF iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone asset and art repos
        run: |
          git clone --depth 1 https://github.com/FunkinCrew/Funkin.assets assets
          git clone --depth 1 https://github.com/FunkinCrew/Funkin.art art

      - name: Install Haxe and Neko via Homebrew
        run: |
          brew install neko
          brew install haxe
          haxe --version
          neko --version
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib

      - name: Install hmm (dependency manager)
        run: |
          haxelib --global install hmm --quiet
          haxelib --global run hmm setup

      - name: Install Haxe dependencies
        run: haxelib run hmm install --quiet
        timeout-minutes: 30

      - name: Compile hxcpp tools
        run: |
          cd $(haxelib path hxcpp | sed "s/,//g")/tools/hxcpp
          haxe compile.hxml

      - name: Build for iOS (no signing)
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
          DEVELOPMENT_TEAM: ""
        run: haxelib run lime build ios -release -D nosign --times
        timeout-minutes: 60

      - name: Package IPA
        run: |
          APP_PATH="export/release/ios/build/Release-iphoneos/Funkin.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at default path, searching..."
            APP_PATH=$(find export -name "Funkin.app" -type d 2>/dev/null | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "ERROR: Funkin.app not found"
              find export -name "*.app" -type d 2>/dev/null || true
              exit 1
            fi
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r FNF_0.7.4_iOS.ipa Payload/
          ls -lh FNF_0.7.4_iOS.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FNF_0.7.4_iOS
          path: FNF_0.7.4_iOS.ipa
          retention-days: 7
