name: Build FNF iOS IPA (macos-14)
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 120
    env:
      NEKOPATH: /opt/homebrew/lib/neko
      HAXE_STD_PATH: /opt/homebrew/lib/haxe/std
    steps:
      - uses: actions/checkout@v4
      - name: Clone asset and art repos
        run: |
          git clone --depth 1 https://github.com/FunkinCrew/Funkin.assets assets
          git clone --depth 1 https://github.com/FunkinCrew/Funkin.art art
      - name: Install Haxe and Neko via Homebrew
        run: |
          brew install neko
          brew install haxe
          echo "NEKOPATH=/opt/homebrew/lib/neko" >> $GITHUB_ENV
          echo "HAXE_STD_PATH=/opt/homebrew/lib/haxe/std" >> $GITHUB_ENV
          haxe --version
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib
      - name: Install hmm
        run: |
          haxelib --global install hmm --quiet
          haxelib --global run hmm setup
      - name: Install Haxe dependencies
        run: haxelib run hmm install --quiet
        timeout-minutes: 30
      - name: Patch project.hxp to disable code signing
        run: |
          sed -i '' 's/config.set("ios.team-id", IOS_TEAM_ID);/config.set("ios.team-id", "");/' project.hxp
          grep -n "team-id" project.hxp
      - name: Find and patch lime source
        run: |
          echo "=== Searching for allowProvisioningUpdates ==="
          grep -rl "allowProvisioningUpdates" .haxelib/ ~/haxelib/ 2>/dev/null || echo "Not found"
          grep -rl "allowProvisioningUpdates" .haxelib/ ~/haxelib/ 2>/dev/null | while read f; do
            echo "Patching: $f"
            sed -i '' 's/ -allowProvisioningUpdates//g; s/ -allowProvisioningDeviceRegistration//g' "$f"
          done
      - name: List Xcode version
        run: xcodebuild -version
      - name: Build for iOS (lime build, may fail at xcodebuild)
        continue-on-error: true
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
          DEVELOPMENT_TEAM: ""
        run: haxelib run lime build ios -release -D nosign --times
        timeout-minutes: 90
      - name: Diagnose and fix pbxproj
        if: always()
        run: |
          cd export/release/ios
          echo "=== plutil lint ==="
          plutil -lint Funkin.xcodeproj/project.pbxproj 2>&1 || true
          echo "=== Converting pbxproj to XML ==="
          cp Funkin.xcodeproj/project.pbxproj Funkin.xcodeproj/project.pbxproj.bak
          plutil -convert xml1 Funkin.xcodeproj/project.pbxproj 2>&1 && echo "XML OK" || echo "XML failed"
          echo "=== Creating xcworkspace ==="
          mkdir -p Funkin.xcodeproj/project.xcworkspace
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<Workspace version = "1.0">' '   <FileRef location = "self:"/>' '</Workspace>' > Funkin.xcodeproj/project.xcworkspace/contents.xcworkspacedata
          echo "=== xcodebuild -list ==="
          xcodebuild -list -project Funkin.xcodeproj 2>&1 || true
      - name: Manual xcodebuild
        run: |
          cd export/release/ios
          xcodebuild -configuration Release -project Funkin.xcodeproj -sdk iphoneos build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" PROVISIONING_PROFILE_SPECIFIER="" 2>&1
      - name: Package IPA
        if: always()
        run: |
          APP_PATH=$(find export/release/ios/build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            find export/release/ios -name "*.app" -type d 2>/dev/null || true
            ls -laR export/release/ios/build/ 2>/dev/null | head -80 || true
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload && cp -r "$APP_PATH" Payload/
          zip -r FNF_0.7.4_iOS.ipa Payload
          ls -lh FNF_0.7.4_iOS.ipa
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FNF_0.7.4_iOS
          path: FNF_0.7.4_iOS.ipa
          retention-days: 7
