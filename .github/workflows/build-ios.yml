name: Build FNF iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 120
    env:
      NEKOPATH: /opt/homebrew/lib/neko
      HAXE_STD_PATH: /opt/homebrew/lib/haxe/std

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone asset and art repos
        run: |
          git clone --depth 1 https://github.com/FunkinCrew/Funkin.assets assets
          git clone --depth 1 https://github.com/FunkinCrew/Funkin.art art

      - name: Install Haxe and Neko via Homebrew
        run: |
          brew install neko
          brew install haxe
          echo "NEKOPATH=/opt/homebrew/lib/neko" >> $GITHUB_ENV
          echo "HAXE_STD_PATH=/opt/homebrew/lib/haxe/std" >> $GITHUB_ENV
          haxe --version
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib

      - name: Install hmm (dependency manager)
        run: |
          haxelib --global install hmm --quiet
          haxelib --global run hmm setup

      - name: Install Haxe dependencies
        run: haxelib run hmm install --quiet
        timeout-minutes: 30

      - name: Patch project.hxp to disable code signing
        run: |
          sed -i '' 's/config.set("ios.team-id", IOS_TEAM_ID);/config.set("ios.team-id", "");/' project.hxp
          grep -n "team-id" project.hxp

      - name: List available Xcode versions
        run: |
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          xcodebuild -version

      - name: Build for iOS (no signing)
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
          DEVELOPMENT_TEAM: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
        run: haxelib run lime build ios -release -D nosign --times
        timeout-minutes: 90

      - name: Package IPA
        if: always()
        run: |
          APP_PATH="export/release/ios/build/Release-iphoneos/Funkin.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at default path, searching..."
            APP_PATH=$(find export -name "Funkin.app" -type d 2>/dev/null | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "ERROR: Funkin.app not found"
              find export -name "*.app" -type d 2>/dev/null || true
              ls -la export/release/ios/build/ 2>/dev/null || true
              exit 1
            fi
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r FNF_0.7.4_iOS.ipa Payload/
          ls -lh FNF_0.7.4_iOS.ipa

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FNF_0.7.4_iOS
          path: FNF_0.7.4_iOS.ipa
          retention-days: 7
